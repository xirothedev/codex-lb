{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrate" (include "codex-lb.fullname" . | trunc 55 | trimSuffix "-") }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": {{ include "codex-lb.migrationHookPhases" . | quote }}
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-failed
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "codex-lb.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "codex-lb.migrationServiceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $pullSecrets := concat (.Values.global.imagePullSecrets | default list) (.Values.image.pullSecrets | default list) }}
      {{- if $pullSecrets }}
      imagePullSecrets:
        {{- range $pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with (include "codex-lb.globalNodeSelector" .) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
         - name: wait-for-db
           image: postgres:16-alpine
           imagePullPolicy: IfNotPresent
           securityContext:
             allowPrivilegeEscalation: false
             readOnlyRootFilesystem: true
             runAsNonRoot: true
             runAsUser: 999
             capabilities:
               drop:
                 - ALL
           command:
             - sh
             - -c
             - |
               echo "Waiting for PostgreSQL to be ready (timeout: 60s)..."
               i=0
               until pg_isready -h {{ printf "%s-postgresql" .Release.Name | quote }} -p 5432 -U {{ .Values.postgresql.auth.username | quote }} -d {{ .Values.postgresql.auth.database | quote }}; do
                 i=$((i + 1))
                 if [ $i -ge 30 ]; then
                   echo "ERROR: PostgreSQL not ready after 60s"
                   exit 1
                 fi
                 echo "PostgreSQL not ready, sleeping 2s... ($i/30)"
                 sleep 2
               done
               echo "PostgreSQL is ready!"
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "codex-lb.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - python
            - -m
            - app.db.migrate
            - upgrade
          env:
            {{- if or .Values.externalSecrets.enabled .Values.auth.existingSecret .Values.externalDatabase.existingSecret }}
            - name: CODEX_LB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "codex-lb.databaseUrlSecretName" . }}
                  key: {{ .Values.auth.secretKeys.databaseUrl }}
            {{- else }}
            - name: CODEX_LB_DATABASE_URL
              value: {{ include "codex-lb.databaseUrl" . | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
