<svg width="720" height="390" viewBox="0 0 720 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Usage donut mockup with Used row</title>
  <desc id="desc">A close mockup of the dashboard donut card showing 5h Remaining, 425 remaining out of 500 total, with 15 percent used across 2 of 4 accounts and a gray Used row below the account list.</desc>
  <rect width="720" height="390" fill="#F8FAFC"/>
  <rect x="24.5" y="24.5" width="671" height="341" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="56" y="65" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">5h Remaining</text>

  <g transform="translate(0 -2)">
    <g transform="translate(57 96)">
      <circle cx="72" cy="72" r="53" stroke="#E2E8F0" stroke-width="18" fill="none"/>
      <g transform="rotate(-90 72 72)">
        <circle cx="72" cy="72" r="53" pathLength="100" stroke="#3B82F6" stroke-width="18" stroke-dasharray="25 75" stroke-dashoffset="0" fill="none"/>
        <circle cx="72" cy="72" r="53" pathLength="100" stroke="#8B5CF6" stroke-width="18" stroke-dasharray="25 75" stroke-dashoffset="-25" fill="none"/>
        <circle cx="72" cy="72" r="53" pathLength="100" stroke="#10B981" stroke-width="18" stroke-dasharray="18 82" stroke-dashoffset="-50" fill="none"/>
        <circle cx="72" cy="72" r="53" pathLength="100" stroke="#F59E0B" stroke-width="18" stroke-dasharray="17 83" stroke-dashoffset="-68" fill="none"/>
        <circle cx="72" cy="72" r="53" pathLength="100" stroke="#D3D3D3" stroke-width="18" stroke-dasharray="15 85" stroke-dashoffset="-85" fill="none"/>
      </g>
      <circle cx="72" cy="72" r="35" fill="#FFFFFF"/>
      <text x="72" y="64" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="1">REMAINING</text>
      <text x="72" y="84" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">425</text>
      <text x="72" y="168" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="11">Total 500 · 15% used</text>
    </g>

    <g font-family="Inter, Arial, sans-serif" font-size="12" transform="translate(265 108)">
      <g transform="translate(0 0)">
        <circle cx="5" cy="5" r="5" fill="#3B82F6"/>
        <text x="16" y="9" fill="#0F172A" font-weight="500">Account A</text>
        <text x="292" y="9" text-anchor="end" fill="#64748B">125</text>
      </g>
      <g transform="translate(0 30)">
        <circle cx="5" cy="5" r="5" fill="#8B5CF6"/>
        <text x="16" y="9" fill="#0F172A" font-weight="500">Account B</text>
        <text x="292" y="9" text-anchor="end" fill="#64748B">125</text>
      </g>
      <g transform="translate(0 60)">
        <circle cx="5" cy="5" r="5" fill="#10B981"/>
        <text x="16" y="9" fill="#0F172A" font-weight="500">Account C</text>
        <text x="292" y="9" text-anchor="end" fill="#64748B">90</text>
      </g>
      <g transform="translate(0 90)">
        <circle cx="5" cy="5" r="5" fill="#F59E0B"/>
        <text x="16" y="9" fill="#0F172A" font-weight="500">Account D</text>
        <text x="292" y="9" text-anchor="end" fill="#64748B">85</text>
      </g>
      <g transform="translate(0 128)">
        <circle cx="5" cy="5" r="5" fill="#D3D3D3"/>
        <text x="16" y="9" fill="#0F172A" font-weight="500">Used</text>
        <text x="292" y="9" text-anchor="end" fill="#64748B">75</text>
      </g>
    </g>
  </g>

</svg>
