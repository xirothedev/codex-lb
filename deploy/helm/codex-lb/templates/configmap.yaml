apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "codex-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  # Database
  CODEX_LB_DATABASE_MIGRATE_ON_STARTUP: {{ .Values.config.databaseMigrateOnStartup | toString | quote }}
  CODEX_LB_DATABASE_POOL_SIZE: {{ .Values.config.databasePoolSize | toString | quote }}
  CODEX_LB_DATABASE_MAX_OVERFLOW: {{ .Values.config.databaseMaxOverflow | toString | quote }}
  # Upstream
  {{- if .Values.config.upstreamBaseUrl }}
  CODEX_LB_UPSTREAM_BASE_URL: {{ .Values.config.upstreamBaseUrl | quote }}
  {{- end }}
  CODEX_LB_UPSTREAM_CONNECT_TIMEOUT_SECONDS: {{ .Values.config.upstreamConnectTimeout | toString | quote }}
  CODEX_LB_UPSTREAM_STREAM_TRANSPORT: {{ .Values.config.upstreamStreamTransport | quote }}
  # Logging
  CODEX_LB_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  # Metrics
  CODEX_LB_METRICS_ENABLED: {{ .Values.metrics.enabled | toString | quote }}
  CODEX_LB_METRICS_PORT: {{ .Values.metrics.port | toString | quote }}
  # Leader election
  CODEX_LB_LEADER_ELECTION_ENABLED: {{ .Values.config.leaderElectionEnabled | toString | quote }}
  CODEX_LB_LEADER_ELECTION_TTL_SECONDS: {{ .Values.config.leaderElectionTtlSeconds | toString | quote }}
  # Circuit breaker
  CODEX_LB_CIRCUIT_BREAKER_ENABLED: {{ .Values.config.circuitBreakerEnabled | toString | quote }}
  CODEX_LB_CIRCUIT_BREAKER_FAILURE_THRESHOLD: {{ .Values.config.circuitBreakerFailureThreshold | toString | quote }}
  CODEX_LB_CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECONDS: {{ .Values.config.circuitBreakerRecoveryTimeoutSeconds | toString | quote }}
  # Backpressure
  CODEX_LB_BACKPRESSURE_MAX_CONCURRENT_REQUESTS: {{ .Values.config.backpressureMaxConcurrentRequests | toString | quote }}
  # Shutdown
  CODEX_LB_SHUTDOWN_DRAIN_TIMEOUT_SECONDS: {{ .Values.config.shutdownDrainTimeoutSeconds | toString | quote }}
  # HTTP connector
  CODEX_LB_HTTP_CONNECTOR_LIMIT: {{ .Values.config.httpConnectorLimit | toString | quote }}
  CODEX_LB_HTTP_CONNECTOR_LIMIT_PER_HOST: {{ .Values.config.httpConnectorLimitPerHost | toString | quote }}
  # Cache affinity
  CODEX_LB_OPENAI_CACHE_AFFINITY_MAX_AGE_SECONDS: {{ .Values.config.cacheAffinityMaxAgeSeconds | toString | quote }}
  CODEX_LB_OPENAI_PROMPT_CACHE_KEY_DERIVATION_ENABLED: {{ .Values.config.promptCacheKeyDerivationEnabled | toString | quote }}
  # Session bridge
  CODEX_LB_HTTP_RESPONSES_SESSION_BRIDGE_ENABLED: {{ .Values.config.sessionBridgeEnabled | toString | quote }}
  CODEX_LB_HTTP_RESPONSES_SESSION_BRIDGE_IDLE_TTL_SECONDS: {{ .Values.config.sessionBridgeIdleTtlSeconds | toString | quote }}
  CODEX_LB_HTTP_RESPONSES_SESSION_BRIDGE_CODEX_IDLE_TTL_SECONDS: {{ .Values.config.sessionBridgeCodexIdleTtlSeconds | toString | quote }}
  CODEX_LB_HTTP_RESPONSES_SESSION_BRIDGE_CODEX_PREWARM_ENABLED: {{ .Values.config.sessionBridgeCodexPrewarmEnabled | toString | quote }}
  CODEX_LB_HTTP_RESPONSES_SESSION_BRIDGE_MAX_SESSIONS: {{ .Values.config.sessionBridgeMaxSessions | toString | quote }}
  CODEX_LB_HTTP_RESPONSES_SESSION_BRIDGE_QUEUE_LIMIT: {{ .Values.config.sessionBridgeQueueLimit | toString | quote }}
  CODEX_LB_HTTP_RESPONSES_SESSION_BRIDGE_INSTANCE_RING: {{ .Values.config.sessionBridgeInstanceRing | quote }}
  # Sticky session cleanup
  CODEX_LB_STICKY_SESSION_CLEANUP_ENABLED: {{ .Values.config.stickySessionCleanupEnabled | toString | quote }}
  CODEX_LB_STICKY_SESSION_CLEANUP_INTERVAL_SECONDS: {{ .Values.config.stickySessionCleanupIntervalSeconds | toString | quote }}
  {{- if .Values.tracing.enabled }}
  CODEX_LB_OTEL_ENABLED: "true"
  CODEX_LB_OTEL_EXPORTER_ENDPOINT: {{ .Values.tracing.endpoint | quote }}
  {{- end }}
