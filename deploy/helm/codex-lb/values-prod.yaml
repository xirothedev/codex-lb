# Production environment — based on the external secrets install mode with HA, observability, and hardened defaults.
replicaCount: 3

postgresql:
  enabled: false
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # 10 min cooldown for bridge session stability
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
affinity:
  podAntiAffinity: hard
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels: {}
networkPolicy:
  enabled: true
metrics:
  serviceMonitor:
    enabled: true
  prometheusRule:
    enabled: true
  grafanaDashboard:
    enabled: true
ingress:
  enabled: true
  certManager:
    enabled: true
config:
  # Connection pool budget: (databasePoolSize + databaseMaxOverflow) × maxReplicas ≤ PostgreSQL max_connections
  # For maxReplicas=20: (3+2)×20=100 = PG default max_connections
  databasePoolSize: 3
  databaseMaxOverflow: 2
externalSecrets:
  enabled: true
