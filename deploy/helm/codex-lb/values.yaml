# @section Global parameters
global:
  # @param global.imageRegistry Global Docker image registry override
  imageRegistry: ""
  # @param global.imagePullSecrets Global Docker registry pull secrets
  imagePullSecrets: []
  # @param global.storageClass Global storage class for PVCs
  storageClass: ""
  # @param global.nodeSelector Node selector labels applied to ALL pods (deployment, jobs, tests)
  nodeSelector: {}

# @section Common parameters
# @param nameOverride Override the chart name
nameOverride: ""
# @param fullnameOverride Override the full release name
fullnameOverride: ""
# @param commonLabels Labels to add to all deployed resources
commonLabels: {}
# @param commonAnnotations Annotations to add to all deployed resources
commonAnnotations: {}
# @param revisionHistoryLimit Number of old ReplicaSets to keep
revisionHistoryLimit: 3

# @section Image parameters
image:
  # @param image.registry Container image registry
  registry: ghcr.io
  # @param image.repository Container image repository
  repository: soju06/codex-lb
  # @param image.tag Container image tag (defaults to appVersion)
  tag: ""
  # @param image.digest Container image digest (overrides tag when set)
  digest: ""
  # @param image.pullPolicy Container image pull policy
  pullPolicy: IfNotPresent
  # @param image.pullSecrets Container image pull secrets
  pullSecrets: []

# @section Deployment parameters
# @param replicaCount Number of replicas
replicaCount: 2
updateStrategy:
  # @param updateStrategy.type Rolling update strategy type
  type: RollingUpdate
  rollingUpdate:
    # @param updateStrategy.rollingUpdate.maxSurge Max surge pods during update
    maxSurge: 1
    # @param updateStrategy.rollingUpdate.maxUnavailable Max unavailable pods during update
    maxUnavailable: 0
# @param terminationGracePeriodSeconds Pod termination grace period seconds
terminationGracePeriodSeconds: 60
# @param preStopSleepSeconds Seconds to sleep in preStop lifecycle hook
preStopSleepSeconds: 15
resources:
  requests:
    # @param resources.requests.cpu CPU request
    cpu: 200m
    # @param resources.requests.memory Memory request
    memory: 256Mi
  limits:
    # @param resources.limits.cpu CPU limit
    cpu: 1000m
    # @param resources.limits.memory Memory limit
    memory: 1Gi
# @param extraEnv Additional environment variables (list of {name, value} or {name, valueFrom})
extraEnv: []
# @param extraEnvFrom Additional envFrom sources (ConfigMap or Secret refs)
extraEnvFrom: []
# @param extraVolumes Additional volumes to mount in the pod
extraVolumes: []
# @param extraVolumeMounts Additional volume mounts in the container
extraVolumeMounts: []

# @section Security parameters
podSecurityContext:
  # @param podSecurityContext.runAsNonRoot Require non-root user
  runAsNonRoot: true
  # @param podSecurityContext.runAsUser UID to run the container as
  runAsUser: 1000
  # @param podSecurityContext.fsGroup FSGroup for volume ownership
  fsGroup: 1000
  seccompProfile:
    # @param podSecurityContext.seccompProfile.type Seccomp profile type
    type: RuntimeDefault
containerSecurityContext:
  # @param containerSecurityContext.allowPrivilegeEscalation Prevent privilege escalation
  allowPrivilegeEscalation: false
  # @param containerSecurityContext.readOnlyRootFilesystem Use read-only root filesystem
  readOnlyRootFilesystem: true
  capabilities:
    # @param containerSecurityContext.capabilities.drop Capabilities to drop
    drop:
      - ALL
serviceAccount:
  # @param serviceAccount.create Create a ServiceAccount for the pod
  create: true
  # @param serviceAccount.name Override the ServiceAccount name
  name: ""
  # @param serviceAccount.annotations Annotations to add to the ServiceAccount
  annotations: {}
  # @param serviceAccount.automount Disable service account token automounting
  automount: false

# @section Application parameters
# Maps to CODEX_LB_* environment variables. Only ~17 K8s-relevant vars are templated here.
# Use extraEnv for all other settings.
config:
  # @param config.databaseMigrateOnStartup Disable auto-migration (migration Job handles it)
  databaseMigrateOnStartup: false
  # @param config.databasePoolSize SQLAlchemy connection pool size
  # Connection pool budget: (databasePoolSize + databaseMaxOverflow) × maxReplicas MUST be ≤ PostgreSQL max_connections (default 100)
  # Default (5+5)×10=100 fits HPA maxReplicas=10 against PG default max_connections.
  # Prod overlay uses (3+2)×20=100. Increase PG max_connections or deploy PgBouncer if more concurrency is needed.
  databasePoolSize: 5
  # @param config.databaseMaxOverflow SQLAlchemy connection pool max overflow
  databaseMaxOverflow: 5
  # @param config.upstreamBaseUrl Override OpenAI upstream base URL (empty = default)
  upstreamBaseUrl: ""
  # @param config.upstreamConnectTimeout Upstream connection timeout seconds
  upstreamConnectTimeout: 10
  # @param config.upstreamStreamTransport Upstream streaming transport (auto|websocket|http)
  upstreamStreamTransport: auto
  # @param config.logFormat Log output format (json|text)
  logFormat: json
  # @param config.leaderElectionEnabled Enable DB-based leader election
  leaderElectionEnabled: true
  # @param config.leaderElectionTtlSeconds Leader election TTL in seconds
  leaderElectionTtlSeconds: 30
  # @param config.circuitBreakerEnabled Enable circuit breaker for upstream requests
  circuitBreakerEnabled: true
  # @param config.circuitBreakerFailureThreshold Number of failures before opening circuit
  circuitBreakerFailureThreshold: 5
  # @param config.circuitBreakerRecoveryTimeoutSeconds Seconds before half-open state
  circuitBreakerRecoveryTimeoutSeconds: 60
  # @param config.backpressureMaxConcurrentRequests Max concurrent in-flight requests
  backpressureMaxConcurrentRequests: 200
  # @param config.shutdownDrainTimeoutSeconds Graceful shutdown drain timeout
  shutdownDrainTimeoutSeconds: 30
  # @param config.httpConnectorLimit Global HTTP connection pool limit
  httpConnectorLimit: 100
  # @param config.httpConnectorLimitPerHost Per-host HTTP connection pool limit
  httpConnectorLimitPerHost: 50
  # @param config.cacheAffinityMaxAgeSeconds TTL for prompt cache sticky sessions (account affinity)
  cacheAffinityMaxAgeSeconds: 1800
  # @param config.promptCacheKeyDerivationEnabled Auto-derive prompt cache keys when client omits them
  promptCacheKeyDerivationEnabled: true
  # @param config.sessionBridgeEnabled Enable in-memory upstream WebSocket session reuse
  sessionBridgeEnabled: true
  # @param config.sessionBridgeIdleTtlSeconds Idle TTL for general API session bridge sessions
  sessionBridgeIdleTtlSeconds: 120
  # @param config.sessionBridgeCodexIdleTtlSeconds Idle TTL for Codex session bridge sessions
  sessionBridgeCodexIdleTtlSeconds: 900
  # @param config.sessionBridgeCodexPrewarmEnabled Proactively open upstream WebSocket for Codex sessions
  sessionBridgeCodexPrewarmEnabled: true
  # @param config.sessionBridgeMaxSessions Max in-memory bridge sessions per pod
  sessionBridgeMaxSessions: 256
  # @param config.sessionBridgeQueueLimit Max pending requests per bridge session
  sessionBridgeQueueLimit: 8
  # @param config.sessionBridgeInstanceRing Comma-separated pod hostnames for session routing
  sessionBridgeInstanceRing: ""
  # @param config.stickySessionCleanupEnabled Enable periodic cleanup of stale sticky sessions
  stickySessionCleanupEnabled: true
  # @param config.stickySessionCleanupIntervalSeconds Interval between sticky session cleanup runs
  stickySessionCleanupIntervalSeconds: 300

# @section Authentication parameters
auth:
  # @param auth.existingSecret Name of existing Secret containing database-url and encryption-key
  existingSecret: ""
  # @param auth.encryptionKey Fernet encryption key (auto-generated when empty and no existing Secret is used)
  encryptionKey: ""
  secretKeys:
    # @param auth.secretKeys.databaseUrl Key in the Secret for the database URL
    databaseUrl: database-url
    # @param auth.secretKeys.encryptionKey Key in the Secret for the Fernet encryption key
    encryptionKey: encryption-key
externalSecrets:
  # @param externalSecrets.enabled Enable ExternalSecrets Operator integration
  enabled: false
  # @param externalSecrets.secretStoreRef.name Name of the SecretStore or ClusterSecretStore
  secretStoreRef:
    name: ""
    kind: SecretStore
  # @param externalSecrets.refreshInterval How often to refresh the secret
  refreshInterval: 1h
rollout:
  reloader:
    # @param rollout.reloader.enabled Add Stakater Reloader annotations so pod restarts follow Secret/ConfigMap updates
    enabled: false
  # @param rollout.manualToken Optional operator-managed token to force a rollout when externally managed Secret contents change
  manualToken: ""

# @section Availability parameters
pdb:
  # @param pdb.create Create a PodDisruptionBudget
  create: true
  # @param pdb.maxUnavailable Maximum unavailable pods (string or integer)
  maxUnavailable: 1
  # @param pdb.minAvailable Minimum available pods (overrides maxUnavailable if set)
  minAvailable: ""
autoscaling:
  # @param autoscaling.enabled Enable HorizontalPodAutoscaler
  enabled: false
  # @param autoscaling.minReplicas Minimum replicas
  minReplicas: 2
  # @param autoscaling.maxReplicas Maximum replicas
  maxReplicas: 10
  # @param autoscaling.targetCPUUtilizationPercentage Target CPU utilization percentage
  targetCPUUtilizationPercentage: 70
  # @param autoscaling.targetMemoryUtilizationPercentage Target memory utilization percentage (0 = disabled)
  targetMemoryUtilizationPercentage: 0
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120  # Slowed from 60s to 120s — bridge sessions need time to drain
          # Bridge sessions have TTLs up to 3600s; slower scale-down reduces cache disruption
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
affinity:
  # @param affinity.podAntiAffinity Pod anti-affinity mode (soft|hard|none)
  podAntiAffinity: soft
# @param topologySpreadConstraints Topology spread constraints for zone distribution
topologySpreadConstraints: []
# @param nodeSelector Node selector labels
nodeSelector: {}
# @param tolerations Pod tolerations
tolerations: []
# @param priorityClassName Pod priority class name
priorityClassName: ""

# @section Service parameters
service:
  # @param service.type Kubernetes Service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  # @param service.port Service port
  port: 2455
  # @param service.nodePort NodePort number (only when type is NodePort)
  nodePort: ""
  # @param service.loadBalancerIP Static IP for LoadBalancer type
  loadBalancerIP: ""
  # @param service.loadBalancerSourceRanges Allowed source ranges for LoadBalancer
  loadBalancerSourceRanges: []
  # @param service.annotations Additional annotations for the Service
  annotations: {}

# @section Network parameters
networkPolicy:
  # @param networkPolicy.enabled Enable NetworkPolicy with default-deny + whitelist
  enabled: false
  # @param networkPolicy.ingressNSMatchLabels Labels to match for ingress controller namespace
  ingressNSMatchLabels: {}
  # @param networkPolicy.extraIngress Additional ingress rules
  extraIngress: []
  # @param networkPolicy.extraEgress Additional egress rules
  extraEgress: []

# @section Ingress parameters
ingress:
  # @param ingress.enabled Enable standard Kubernetes Ingress
  enabled: false
  # @param ingress.ingressClassName Ingress class name (e.g. nginx)
  ingressClassName: ""
  # @param ingress.annotations Ingress annotations
  annotations: {}
  # @param ingress.hosts Ingress host rules
  hosts:
    - host: codex-lb.example.com
      paths:
        - path: /
          pathType: Prefix
  # @param ingress.tls TLS configuration
  tls: []
  certManager:
    # @param ingress.certManager.enabled Add cert-manager annotations
    enabled: false
    # @param ingress.certManager.clusterIssuer cert-manager cluster issuer name
    clusterIssuer: letsencrypt-prod
  nginx:
    # @param ingress.nginx.enabled Add nginx-specific annotations
    enabled: false
    # @param ingress.nginx.upstreamHashBy nginx upstream-hash-by annotation value. Empty = disabled.
    #        Set to "$http_authorization" for consistent hash routing by API key.
    upstreamHashBy: "$http_authorization"
    # @param ingress.nginx.upstreamHashBySubset Enable subset mode for upstream-hash-by
    upstreamHashBySubset: false
    # @param ingress.nginx.upstreamHashBySubsetSize Subset size when subset mode is enabled
    upstreamHashBySubsetSize: 3

# @section Gateway API parameters
gatewayApi:
  # @param gatewayApi.enabled Enable Gateway API HTTPRoute
  enabled: false
  # @param gatewayApi.parentRefs Gateway parent references
  parentRefs:
    - name: gateway
      namespace: gateway-system
  # @param gatewayApi.hostnames HTTPRoute hostnames
  hostnames: []
  # @param gatewayApi.annotations HTTPRoute annotations
  annotations: {}

# @section Observability parameters
metrics:
  # @param metrics.enabled Enable Prometheus metrics endpoint (CODEX_LB_METRICS_ENABLED)
  enabled: true
  # @param metrics.port Metrics server port (CODEX_LB_METRICS_PORT)
  port: 9090
  serviceMonitor:
    # @param metrics.serviceMonitor.enabled Create a ServiceMonitor for Prometheus Operator
    # Defaults to false because it requires the Prometheus Operator CRDs to be installed.
    # Enable this when running kube-prometheus-stack or standalone Prometheus Operator.
    # Without ServiceMonitor, configure prometheus.io annotations for scraping:
    #   commonAnnotations:
    #     prometheus.io/scrape: "true"
    #     prometheus.io/port: "9090"
    #     prometheus.io/path: "/metrics"
    enabled: false
    # @param metrics.serviceMonitor.interval Metrics scrape interval
    interval: 30s
    # @param metrics.serviceMonitor.scrapeTimeout Metrics scrape timeout
    scrapeTimeout: ""
    # @param metrics.serviceMonitor.additionalLabels Additional labels for Prometheus Operator selector
    additionalLabels: {}
    # @param metrics.serviceMonitor.relabelings Relabeling rules
    relabelings: []
  prometheusRule:
    # @param metrics.prometheusRule.enabled Create PrometheusRule for alerting
    # Requires Prometheus Operator. Includes alerts for: high error rate, circuit breaker open,
    # all accounts exhausted, high request latency. See templates/prometheusrule.yaml for details.
    enabled: false
    # @param metrics.prometheusRule.additionalLabels Additional labels for PrometheusRule
    additionalLabels: {}
    # @param metrics.prometheusRule.additionalRules Additional alert rules to append
    additionalRules: []
  grafanaDashboard:
    # @param metrics.grafanaDashboard.enabled Create Grafana dashboard ConfigMap for sidecar
    enabled: false
    # @param metrics.grafanaDashboard.folder Grafana dashboard folder label
    folder: codex-lb

# @section Tracing parameters
tracing:
  # @param tracing.enabled Enable OpenTelemetry tracing (OTLP gRPC port 4317)
  enabled: false
  # @param tracing.endpoint OTLP gRPC endpoint (e.g. http://jaeger:4317)
  endpoint: ""

# @section Database parameters
postgresql:
  # @param postgresql.enabled Deploy Bitnami PostgreSQL sub-chart (set false for external DB)
  enabled: true
  auth:
    # @param postgresql.auth.username PostgreSQL username
    username: codexlb
    # @param postgresql.auth.password PostgreSQL password (change in production!)
    password: changeme
    # @param postgresql.auth.database PostgreSQL database name
    database: codexlb
  primary:
    persistence:
      # @param postgresql.primary.persistence.enabled Enable persistent storage for PostgreSQL
      enabled: true
      # @param postgresql.primary.persistence.size PostgreSQL PVC size
      size: 8Gi
externalDatabase:
  # @param externalDatabase.url Full external database URL (postgresql+asyncpg://user:pass@host:5432/db?sslmode=require)
  # For production, use auth.existingSecret instead of passing the URL directly.
  # When auth.existingSecret is set, create a Secret with key "database-url" containing the full URL
  # and key "encryption-key" containing a 32-byte Fernet key.
  #
  # Example:
  #   kubectl create secret generic codex-lb-secrets \
  #     --from-literal=database-url="postgresql+asyncpg://user:pass@host:5432/db?sslmode=require" \
  #     --from-literal=encryption-key="$(python3 -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')"
  #   Then set: auth.existingSecret: "codex-lb-secrets"
  url: ""
  # @param externalDatabase.host External database host (used to build URL when externalDatabase.url is empty)
  host: ""
  # @param externalDatabase.port External database port
  port: 5432
  # @param externalDatabase.database External database name
  database: codexlb
  # @param externalDatabase.user External database username
  user: codexlb
  # @param externalDatabase.existingSecret Existing Secret with key "password" for the external database
  existingSecret: ""

# @section Database initialization parameters
dbInit:
  # @param dbInit.enabled Enable pre-install Job to create databases/users on external PostgreSQL
  enabled: false
  # @param dbInit.host External PostgreSQL host
  host: ""
  # @param dbInit.port External PostgreSQL port
  port: "5432"
  # @param dbInit.adminUser Admin username for creating databases/users
  adminUser: "adminuser"
  # @param dbInit.adminPassword Admin password (use adminPasswordSecret for production)
  adminPassword: ""
  # @param dbInit.adminPasswordSecret Reference to existing Secret for admin password
  adminPasswordSecret: {}
  #   name: pg-admin-secret
  #   key: password
  # @param dbInit.databases List of databases and users to create
  databases:
    - name: codexlb
      user: codexlb
      password: changeme

# @section Migration parameters
migration:
  # @param migration.enabled Run database migration Job on install/upgrade
  enabled: true
  # @param migration.backoffLimit Maximum retries before marking Job failed
  backoffLimit: 3
  # @param migration.activeDeadlineSeconds Maximum Job duration in seconds
  activeDeadlineSeconds: 300
  schemaGate:
    # @param migration.schemaGate.enabled Add an initContainer that blocks the app until Alembic head is visible
    enabled: true
    # @param migration.schemaGate.timeoutSeconds Maximum seconds the app initContainer waits for schema head
    timeoutSeconds: 300
    # @param migration.schemaGate.intervalSeconds Poll interval in seconds while waiting for schema head
    intervalSeconds: 2
  resources:
    requests:
      # @param migration.resources.requests.cpu Migration Job CPU request
      cpu: 100m
      # @param migration.resources.requests.memory Migration Job memory request
      memory: 128Mi
    limits:
      # @param migration.resources.limits.cpu Migration Job CPU limit
      cpu: 500m
      # @param migration.resources.limits.memory Migration Job memory limit
      memory: 256Mi
