{{- if .Values.ingress.enabled }}
{{- $annotations := dict }}
{{- if .Values.ingress.certManager.enabled }}
{{- $_ := set $annotations "cert-manager.io/cluster-issuer" .Values.ingress.certManager.clusterIssuer }}
{{- end }}
{{- if .Values.ingress.nginx.enabled }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/proxy-http-version" "1.1" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/proxy-buffering" "off" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/proxy-request-buffering" "off" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/proxy-body-size" "50m" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/proxy-read-timeout" "3600" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/proxy-send-timeout" "3600" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/proxy-next-upstream" "error" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/proxy-next-upstream-tries" "1" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/limit-rps" "100" }}
{{- end }}
{{- if .Values.ingress.nginx.upstreamHashBy }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/upstream-hash-by" .Values.ingress.nginx.upstreamHashBy }}
{{- end }}
{{- if .Values.ingress.nginx.upstreamHashBySubset }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/upstream-hash-by-subset" "true" }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/upstream-hash-by-subset-size" (.Values.ingress.nginx.upstreamHashBySubsetSize | toString) }}
{{- end }}
{{- range $key, $value := .Values.ingress.annotations }}
{{- $_ := set $annotations $key $value }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "codex-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "codex-lb.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "codex-lb.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
